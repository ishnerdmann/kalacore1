[build]
  # No build step — serve static files directly
  command = ""
  publish = "."

# Cache headers — no caching for HTML/JS/CSS so changes reflect immediately
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[redirects]]
  from = "/googleca7a9cdbf7388112.html"
  to = "/public/googleca7a9cdbf7388112.html"
  status = 200
